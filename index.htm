<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- 🔥 关键验证（必须放这里） -->
  <meta name="base:app_id" content="69b8fe0c2d5d7c1605e632ff" />

  <title>MintNFT1</title>

  <!-- 样式 -->
  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      background: #0b0f19;
      color: white;
    }

    .container {
      max-width: 900px;
      margin: 80px auto;
      text-align: center;
    }

    h1 {
      font-size: 48px;
      margin-bottom: 10px;
      background: linear-gradient(90deg, #4f8cff, #a855f7);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    p {
      color: #aaa;
      font-size: 18px;
    }

    .card {
      margin-top: 40px;
      padding: 30px;
      background: #121826;
      border-radius: 16px;
      box-shadow: 0 0 40px rgba(0,0,0,0.3);
    }

    button {
      margin-top: 20px;
      padding: 12px 24px;
      font-size: 16px;
      border: none;
      border-radius: 10px;
      background: linear-gradient(90deg, #4f8cff, #a855f7);
      color: white;
      cursor: pointer;
    }

    button:hover {
      opacity: 0.85;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>MintNFT</h1>
    <p>A simple NFT minting dApp on Base</p>

    <div class="card">
      <h2>🚀 Mint Your NFT</h2>
      <p>Connect wallet and mint your exclusive NFT.</p>
      <button onclick="mint()">Mint Now</button>
    </div>
  </div>

  <script>
    function mint() {
      alert("Wallet connection coming soon...");
    }
  </script>
